<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RKN Puzzle Lite</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:Cairo;
  background:#0d0d0d;
  color:#fff;
}

.container {
  max-width:600px;
  margin:50px auto;
  padding:20px;
}

.card {
  background:#111;
  padding:25px;
  border-radius:15px;
  border:1px solid #333;
}

h1 {
  color:#edff00;
  font-size:22px;
}

input {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #333;
  background:#000;
  color:#fff;
}

button {
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#edff00;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.msg {
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>🧩 RKN Puzzle</h1>

    <div id="riddle">جارٍ التحميل...</div>

    <input id="answer" placeholder="اكتب الإجابة"/>
    <button onclick="check()">تحقق</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const API = "https://sheetdb.io/api/v1/k2sg6fiohvzrs";

let CACHE = null;

// تحميل مرة واحدة فقط
async function loadData() {
  if (CACHE) return CACHE;

  const res = await fetch(API);
  const text = await res.text();

  try {
    CACHE = JSON.parse(text);
  } catch {
    document.getElementById("riddle").innerText = "خطأ في تحميل البيانات";
    throw new Error("Invalid API response");
  }

  return CACHE;
}

// جلب لغز واحد (id من الرابط)
function getId() {
  const p = new URLSearchParams(location.search);
  return p.get("id");
}

async function init() {
  const id = getId();
  if (!id) {
    document.getElementById("riddle").innerText = "لا يوجد ID في الرابط";
    return;
  }

  const data = await loadData();
  const row = data.find(r => r.id === id);

  if (!row) {
    document.getElementById("riddle").innerText = "اللغز غير موجود";
    return;
  }

  window.PUZZLE = row;
  document.getElementById("riddle").innerText = row.riddle;
}

function normalize(t){
  return t.trim().replace(/\s+/g,'').toLowerCase();
}

async function check(){
  const input = document.getElementById("answer").value;
  const msg = document.getElementById("msg");

  if (!input) {
    msg.innerText = "اكتب إجابة";
    return;
  }

  const row = window.PUZZLE;
  if (!row) return;

  if (normalize(input) === normalize(row.answer)) {
    msg.innerText = "✔ إجابة صحيحة";

    // تحديث مرة واحدة فقط (بدون ضغط)
    await fetch(`${API}/id/${row.id}`, {
      method:"PATCH",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        status:"used",
        winner_time:new Date().toISOString()
      })
    });

    setTimeout(()=>{
      alert("مبروك 🎉");
    },800);

  } else {
    msg.innerText = "❌ إجابة خاطئة";
  }
}

init();
</script>

</body>
</html>
