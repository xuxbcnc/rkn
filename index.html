<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>RKN PUZZLE</title>
<style>
body{
  background:#0d0d0d;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:40px;
}
.card{
  background:#111;
  padding:20px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:yellow;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
  <h2>🧩 RKN PUZZLE</h2>

  <div id="riddle">Loading...</div>

  <input id="answer" placeholder="اكتب الإجابة">
  <button onclick="check()">تحقق</button>

  <p id="msg"></p>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw_x-_WNsCpmxZ3tFF45mWaYHEvZL8lKaMk2U-m9vsZGlZaClXaUKifO7rcS5knIeyt9g/exec";
const id = new URLSearchParams(location.search).get("id");

let correctAnswer = "";

async function load(){
  const res = await fetch(API + "?id=" + id);
  const data = await res.json();

  document.getElementById("riddle").innerText = data.riddle;
  correctAnswer = data.answer;
}

async function check(){
  let user = document.getElementById("answer").value.trim();

  if(user === correctAnswer){
    document.getElementById("msg").innerText = "🎉 صح!";

    await fetch(API, {
      method:"POST",
      body: JSON.stringify({
        id: id,
        action: "win"
      })
    });

  } else {
    document.getElementById("msg").innerText = "❌ غلط";
  }
}

load();
</script>

</body>
</html>
