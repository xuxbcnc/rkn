<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUKN | THE VAULT</title>
    <style>
        :root {
            --bg-color: #050505;
            --led-blue: #007bff;
            --led-red: #ff3333;
            --text-white: #f5f5f5;
            --border-color: #222;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .vault-container {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--border-color);
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
            position: relative;
        }

        .vault-container::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, transparent, var(--led-blue), transparent);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.2;
        }

        .logo {
            font-size: 2.8rem;
            letter-spacing: 10px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px var(--led-blue);
            font-weight: bold;
        }

        .tagline {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        #status-message {
            color: var(--led-blue);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        #riddle-section { display: none; animation: fadeIn 1s ease-in; }

        .riddle-text {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .riddle-input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--text-white);
            border-radius: 8px;
            text-align: center;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: transparent;
            color: var(--led-blue);
            border: 1px solid var(--led-blue);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn-submit:hover {
            background: var(--led-blue);
            color: white;
            box-shadow: 0 0 20px var(--led-blue);
        }

        .final-message { display: none; animation: fadeIn 1s ease-in; }
        .error { color: var(--led-red); }
        .success { color: var(--led-blue); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="vault-container">
        <div class="logo">RUKN</div>
        <div class="tagline">ORDER AUTHENTICATION</div>

        <div id="status-message">جاري التحقق من التشفير...</div>

        <div id="riddle-section">
            <p class="riddle-text" id="riddle-display"></p>
            <input type="text" class="riddle-input" id="riddle-answer" placeholder="اكتب الحل هنا">
            <button class="btn-submit" onclick="verifyAnswer()">فك القفل</button>
        </div>

        <div id="error-message" class="final-message error">
            <h2>دخول مرفوض</h2>
            <p>الكود مستخدم مسبقاً أو غير موجود في النظام.</p>
        </div>

        <div id="success-message" class="final-message success">
            <h2>تم الاختراق بنجاح</h2>
            <p>كود الخصم: <span style="border: 1px dashed var(--led-blue); padding: 5px;">RUKN-PROMO-20</span></p>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/e1vsn0ila9lsc";
        let currentCard = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId) {
                checkCard(cardId);
            } else {
                document.getElementById('status-message').innerText = "برجاء مسح كارت الـ QR الأصلي.";
            }
        };

        async function checkCard(id) {
            try {
                const response = await fetch(`${API_URL}/search?id=${id}`);
                const data = await response.json();

                document.getElementById('status-message').style.display = 'none';

                if (data.length > 0 && data[0].status === "Active") {
                    currentCard = data[0];
                    document.getElementById('riddle-section').style.display = 'block';
                    document.getElementById('riddle-display').innerText = currentCard.riddle;
                } else {
                    document.getElementById('error-message').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('status-message').innerText = "خطأ في الاتصال بالنظام.";
            }
        }

        async function verifyAnswer() {
            const answerIn = document.getElementById('riddle-answer').value;
            if (answerIn === currentCard.answer) {
                // تحديث الحالة لـ Used في الشيت
                await fetch(`${API_URL}/id/${currentCard.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "data": { "status": "Used" } })
                });
                
                document.getElementById('riddle-section').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
            } else {
                alert("إجابة خاطئة.. ركز يا بطل!");
            }
        }
    </script>
</body>
</html>
