<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن | RKN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0d0d0d;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .container {
            background: #141414;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #1f1f1f;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        h1 { font-weight: 900; letter-spacing: 4px; margin-bottom: 20px; }

        .riddle-box {
            background: #0a0a0a;
            padding: 20px;
            border-right: 2px solid #edff00;
            margin-bottom: 25px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #222;
            border-radius: 6px;
            margin-bottom: 15px;
            color: #fff;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: #edff00; }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #edff00; }

        .hidden { display: none; }

        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            transition: 0.3s;
            color: #eee;
            background: #1a1a1a;
            border: 1px solid #282828;
        }

        .btn-contact i {
            font-size: 1.1rem;
            color: #888;
            transition: 0.3s;
        }

        .btn-contact:hover {
            border-color: #edff00;
            color: #fff;
            background: #1d1d1d;
        }

        .btn-contact:hover i {
            color: #edff00;
        }

        .serial-tag {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="main-card">
        <div id="loading">CHECKING...</div>
        <div id="content" class="hidden">
            <h1>RKN</h1>
            <div class="riddle-box" id="riddle-text"></div>
            <input type="text" id="user-answer" placeholder="SOLUTION">
            <button onclick="checkAnswer()">VERIFY</button>
        </div>
        <div id="success-msg" class="hidden"></div>
        <div id="error-msg" class="hidden">INVALID CODE</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
