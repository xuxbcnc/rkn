<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RKN Puzzle</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0d0d0d;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:500px;
  background:#151515;
  padding:20px;
  border-radius:12px;
  border:1px solid #333;
  text-align:center;
}

h2{color:#edff00}

input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  border:1px solid #333;
  background:#0d0d0d;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#edff00;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.msg{
  margin-top:10px;
  font-size:14px;
}

.bad{color:#ff4d4d}
.good{color:#00e676}
</style>
</head>

<body>

<div class="card">
  <h2>🧩 RKN PUZZLE</h2>

  <div id="riddle">Loading...</div>

  <input id="answer" placeholder="اكتب الإجابة">
  <button onclick="checkAnswer()">تحقق</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw_x-_WNsCpmxZ3tFF45mWaYHEvZL8lKaMk2U-m9vsZGlZaClXaUKifO7rcS5knIeyt9g/exec";

let puzzle = null;

// ================== LOAD PUZZLE ==================
async function load(){
  const id = new URLSearchParams(location.search).get("id");

  if(!id){
    document.getElementById("riddle").innerText = "❌ مفيش ID";
    return;
  }

  try{
    const res = await fetch(API + "?id=" + id);
    const data = await res.json();

    // أهم سطر عشان نتفادى أي error
    puzzle = Array.isArray(data) ? data[0] : data;

    if(!puzzle){
      document.getElementById("riddle").innerText = "❌ اللغز غير موجود";
      return;
    }

    if(puzzle.status && puzzle.status.toLowerCase() !== "active"){
      document.getElementById("riddle").innerText = "🔒 اللغز مستخدم أو مقفول";
      return;
    }

    document.getElementById("riddle").innerText = puzzle.riddle;

  }catch(e){
    document.getElementById("riddle").innerText = "❌ خطأ في التحميل";
  }
}

load();

// ================== CHECK ANSWER ==================
async function checkAnswer(){

  const user = document.getElementById("answer").value.trim();
  const msg  = document.getElementById("msg");

  if(!user){
    msg.innerText = "اكتب إجابة";
    msg.className = "msg bad";
    return;
  }

  try{

    const res = await fetch(API, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        id: puzzle.id,
        answer: user
      })
    });

    const result = await res.json();

    if(result.success){
      msg.innerText = "🎉 " + result.message;
      msg.className = "msg good";
    }else{
      msg.innerText = "❌ " + result.message;
      msg.className = "msg bad";
    }

  }catch(e){
    msg.innerText = "❌ error";
    msg.className = "msg bad";
  }
}
</script>

</body>
</html>
