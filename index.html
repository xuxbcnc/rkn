<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن | RKN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0a0a0a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .container {
            background: #111111;
            padding: 2.5rem;
            border-radius: 15px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h1 { font-weight: 900; letter-spacing: 5px; color: #fff; margin-bottom: 5px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        .riddle-box {
            background: #1a1a1a;
            padding: 20px;
            border-right: 4px solid #edff00;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #fff;
            font-family: 'Cairo';
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        input:focus { border-color: #edff00; }

        button {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #edff00; transform: translateY(-2px); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div id="loading">جاري التحقق من الكود...</div>
        
        <div id="content" class="hidden">
            <h1>ركن</h1>
            <p>DECODE TO UNLOCK</p>
            <div class="riddle-box" id="riddle-text"></div>
            <input type="text" id="user-answer" placeholder="اكتب الحل هنا">
            <button onclick="checkAnswer()">فك التشفير</button>
        </div>

        <div id="error-msg" class="hidden">
            <h2 style="color: #ff3e3e;">ACCESS DENIED</h2>
            <p>الكود ده مش شغال أو استُخدم قبل كدة.</p>
        </div>

        <div id="success-msg" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
