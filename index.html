<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن | فك التشفير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #007bff; /* تقدر تغيره للون براند ركن */
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--primary-color);
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-weight: 900; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }

        .riddle-box {
            background: #f9f9f9;
            padding: 15px;
            border-right: 5px solid var(--accent-color);
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: 'Cairo';
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-color); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .hidden { display: none; }

        .success-icon { font-size: 50px; color: #28a745; }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div id="loading">جاري التحقق من الكود...</div>
        
        <div id="content" class="hidden">
            <h1>ركن | RKN</h1>
            <p>حل الفزورة لفك التشفير والحصول على جائزتك</p>
            
            <div class="riddle-box" id="riddle-text">
                </div>

            <input type="text" id="user-answer" placeholder="اكتب إجابتك هنا...">
            <button onclick="checkAnswer()">فك التشفير</button>
        </div>

        <div id="error-msg" class="hidden">
            <h2 style="color: red;">دخول مرفوض!</h2>
            <p>هذا الكود غير صالح أو تم استخدامه من قبل.</p>
        </div>

        <div id="success-msg" class="hidden">
            <div class="success-icon">✔️</div>
            <h2>تم فك التشفير بنجاح!</h2>
            <p>مبروك! تقدر دلوقتي تستخدم الخصم بتاعك.</p>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/k2sg6fiohvzrs";
        const urlParams = new URLSearchParams(window.location.search);
        const codeId = urlParams.get('id');
        let correctAnswer = "";

        // دالة تنظيف النص لجعل التحقق ذكي
        function cleanText(text) {
            if (!text) return "";
            return text.toString().trim()
                .replace(/^ال/, "")           // حذف "ال" من البداية
                .replace(/[ة]/g, "ه")         // تاء مربوطة -> هاء
                .replace(/[أإآ]/g, "ا")       // توحيد الألف
                .replace(/\s+/g, "");         // حذف المسافات
        }

        async function init() {
            if (!codeId) {
                showError();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/search?id=${codeId}`);
                const data = await response.json();

                if (data.length > 0 && data[0].status === "Active") {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    document.getElementById('riddle-text').innerText = data[0].riddle;
                    correctAnswer = data[0].answer;
                } else {
                    showError();
                }
            } catch (error) {
                console.error("خطأ في الاتصال:", error);
                showError();
            }
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('user-answer').value;
            
            if (cleanText(userAnswer) === cleanText(correctAnswer)) {
                markAsUsed();
            } else {
                alert("الإجابة غلط، فكر تاني يا بطل!");
            }
        }

        async function markAsUsed() {
            try {
                // تحديث الحالة في شيت دي بي
                await fetch(`${API_URL}/id/${codeId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "status": "Used" })
                });

                document.getElementById('content').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (error) {
                alert("حدث خطأ أثناء تحديث الحالة، لكن إجابتك صحيحة!");
            }
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-msg').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
