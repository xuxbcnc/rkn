<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ركن | RKN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background-color: #0d0d0d;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #ffffff;
}

.container {
    background: #141414;
    padding: 2.5rem;
    border-radius: 12px;
    border: 1px solid #1f1f1f;
    width: 90%;
    max-width: 360px;
    text-align: center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

h1 { font-weight: 900; letter-spacing: 4px; }

.riddle-box {
    background: #0a0a0a;
    padding: 20px;
    border-right: 2px solid #edff00;
    margin-bottom: 25px;
    color: #ccc;
}

input {
    width: 100%;
    padding: 14px;
    background: #000;
    border: 1px solid #222;
    border-radius: 6px;
    margin-bottom: 10px;
    color: #fff;
    text-align: center;
}

input:focus { border-color: #edff00; }

button {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { background: #edff00; }

.msg {
    font-size: 0.85rem;
    height: 18px;
    margin-bottom: 10px;
}

.error { color: #ff4d4d; }
.success { color: #edff00; }

.hidden { display: none; }

.loader {
    border: 3px solid #222;
    border-top: 3px solid #edff00;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    margin: auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.btn-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    padding: 14px;
    border-radius: 8px;
    margin-top: 15px;
    color: #eee;
    background: #1a1a1a;
    border: 1px solid #282828;
}

.btn-contact:hover {
    border-color: #edff00;
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px);}
    50% { transform: translateX(5px);}
    75% { transform: translateX(-5px);}
    100% { transform: translateX(0);}
}
</style>
</head>

<body>

<div class="container">
    <div id="loading" class="loader"></div>

    <div id="content" class="hidden">
        <h1>RKN</h1>
        <div class="riddle-box" id="riddle-text"></div>

        <input type="text" id="user-answer" placeholder="SOLUTION">
        <div class="msg" id="msg"></div>

        <button id="submit-btn">VERIFY</button>
    </div>

    <div id="success" class="hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
