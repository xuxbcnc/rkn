<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن | RKN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0a0a0a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            background: #111111;
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h1 { font-weight: 900; letter-spacing: 5px; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        
        .riddle-box {
            background: #1a1a1a;
            padding: 20px;
            border-right: 4px solid #edff00;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #fff;
            font-family: 'Cairo';
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        input:focus { border-color: #edff00; }

        button {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;      
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        button:hover { background: #edff00; transform: translateY(-3px); }

        .hidden { display: none; }
        
        /* تصميم الأزرار الاحترافي */
        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.05rem;
            margin-bottom: 12px;
            transition: 0.4s;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-whatsapp { 
            background: #25D366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:hover { background: #1ebea5; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5); }

        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3);
        }
        .btn-insta:hover { opacity: 0.9; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(220, 39, 67, 0.5); }

        .serial-tag {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div id="loading">جاري فك التشفير...</div>
        
        <div id="content" class="hidden">
            <h1>ركن</h1>
            <p style="color: #666; margin-bottom: 20px;">DECODE TO UNLOCK</p>
            <div class="riddle-box" id="riddle-text"></div>
            <input type="text" id="user-answer" placeholder="اكتب الحل هنا">
            <button onclick="checkAnswer()">فك التشفير</button>
        </div>

        <div id="error-msg" class="hidden">
            <h2 style="color: #ff3e3e;">ACCESS DENIED</h2>
            <p style="color: #666;">هذا الكود غير صالح.</p>
        </div>

        <div id="success-msg" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
